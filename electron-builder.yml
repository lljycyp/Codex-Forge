appId: com.codex.forge
productName: Codex Forge
artifactName: Codex-Forge-Setup-${version}.${ext}
compression: maximum
electronLanguages:
  - zh-CN
directories:
  output: release
publish:
  provider: github
files:
  - out/**
  - assets/**
extraResources:
  - from: resources
    to: .
    filter:
      - "**/*"
win:
  target:
    - nsis
  icon: assets/app.ico
nsis:
  oneClick: false
  perMachine: false
  differentialPackage: false
  allowToChangeInstallationDirectory: true
