appId: com.chatgpt.forge
productName: ChatGPT Forge
artifactName: ChatGPT-Forge-Setup-${version}.${ext}
compression: maximum
electronLanguages:
  - zh-CN
directories:
  output: release
publish:
  provider: github
  owner: lljycyp
  repo: ChatGPT-Forge
files:
  - out/**
  - assets/**
extraResources:
  - from: resources
    to: .
    filter:
      - "**/*"
win:
  target:
    - nsis
  icon: assets/app.ico
nsis:
  oneClick: false
  perMachine: false
  differentialPackage: false
  allowToChangeInstallationDirectory: true
