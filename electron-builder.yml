appId: com.codex.forge
productName: Codex Forge
directories:
  output: release
files:
  - out/**
  - assets/**
extraResources:
  - from: resources
    to: .
    filter:
      - "**/*"
win:
  target:
    - nsis
  icon: assets/app.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
