version: "1.0"
name: gitee-release
displayName: Gitee-Release
triggers:
  trigger: auto
  push:
    tags:
      prefix:
        - v
variables:
  G_TOKEN: e8eec344ad168f3fef45095b498f8b8a
stages:
  - name: prepare
    displayName: Prepare deploy artifact
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: prepare_deploy_artifact
        displayName: Prepare deploy artifact
        nodeVersion: 22.22.0
        commands:
          - mkdir -p gitee-go-placeholder
          - echo ok > gitee-go-placeholder/README.txt
        artifacts:
          - name: DEPLOY_PLACEHOLDER
            path:
              - gitee-go-placeholder
        notify: []
        strategy:
          retry: "0"
  - name: build
    displayName: Build and publish on Windows host
    strategy: naturally
    trigger: auto
    steps:
      - step: deploy@agent
        name: build_and_publish
        displayName: 主机部署
        hostGroupID:
          ID: windows-builder
          hostID:
            - fe522e11-c989-450c-bec8-7382ab080d20
        deployArtifact:
          - source: build
            name: output
            target: D:\gitee_go\codex-forge
            dependArtifact: DEPLOY_PLACEHOLDER
        script:
          - bash -lc "set -euo pipefail; if [ ! -d /d/gitee_go/codex-forge/.git ]; then git clone https://gitee.com/llj20010218/codex-forge.git /d/gitee_go/codex-forge; fi; cd /d/gitee_go/codex-forge; git remote set-url origin https://gitee.com/llj20010218/codex-forge.git; git fetch --tags origin; git checkout main; git pull --ff-only origin main"
          - bash -lc "set -euo pipefail; cd /d/gitee_go/codex-forge; npm config set registry https://registry.npmmirror.com; command -v yarn >/dev/null 2>&1 || npm install -g yarn; yarn config set registry https://registry.npmmirror.com; command -v uv >/dev/null 2>&1 || powershell -NoProfile -ExecutionPolicy Bypass -Command 'irm https://astral.sh/uv/install.ps1 | iex'; export PATH=\"$HOME/.local/bin:$HOME/.cargo/bin:$PATH\"; yarn install --frozen-lockfile --network-timeout 600000; yarn build"
          - bash -lc "set -euo pipefail; if [ -z \"${G_TOKEN:-}\" ]; then echo G_TOKEN is required on the Windows host or pipeline environment; exit 1; fi; cd /d/gitee_go/codex-forge; export GITEE_TOKEN=\"$G_TOKEN\"; export GITEE_UPLOAD_MAX_TIME=7200; node scripts/publish_gitee_release.js"
        notify: []
        strategy:
          retry: "0"
