version: "1.0"
name: gitee-release
displayName: Gitee-Release
triggers:
  trigger: auto
  push:
    tags:
      prefix:
        - v
stages:
  - name: prepare
    displayName: Prepare deploy artifact
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: prepare_deploy_artifact
        displayName: Prepare deploy artifact
        nodeVersion: 22.22.0
        commands:
          - mkdir -p gitee-go-placeholder
          - echo ok > gitee-go-placeholder/README.txt
        artifacts:
          - name: DEPLOY_PLACEHOLDER
            path:
              - gitee-go-placeholder
        notify: []
        strategy:
          retry: "0"
  - name: build
    displayName: Build and publish on Windows host
    strategy: naturally
    trigger: auto
    steps:
      - step: deploy@agent
        name: build_and_publish
        displayName: 主机部署
        hostGroupID:
          ID: windows-builder
          hostID:
            - d1336508-8ce9-4397-9081-3634988d040e
        deployArtifact:
          - source: build
            name: output
            target: D:\gitee_go\deploy
            dependArtifact: DEPLOY_PLACEHOLDER
        script:
          - '"C:\Program Files\Git\bin\bash.exe" -lc "set -euo pipefail; repo=/d/gitee_go/codex-forge; if [ -e \"$repo\" ] && [ ! -d \"$repo/.git\" ]; then rm -rf \"$repo\"; fi; if [ ! -d \"$repo/.git\" ]; then git clone https://gitee.com/llj20010218/codex-forge.git \"$repo\"; fi; cd \"$repo\"; git remote set-url origin https://gitee.com/llj20010218/codex-forge.git; git fetch --tags origin; git checkout main; git pull --ff-only origin main; npm config set registry https://registry.npmmirror.com; command -v yarn >/dev/null 2>&1 || npm install -g yarn; yarn config set registry https://registry.npmmirror.com; command -v uv >/dev/null 2>&1 || powershell -NoProfile -ExecutionPolicy Bypass -Command ''irm https://astral.sh/uv/install.ps1 | iex''; export PATH=\"$HOME/.local/bin:$HOME/.cargo/bin:$PATH\"; yarn install --frozen-lockfile --network-timeout 600000; yarn build; export GITEE_TOKEN=''${G_TOKEN}''; if [ -z \"$GITEE_TOKEN\" ]; then echo G_TOKEN is required in Gitee Go variables; exit 1; fi; export GITEE_UPLOAD_MAX_TIME=7200; node scripts/publish_gitee_release.js"'
        notify: []
        strategy:
          retry: "0"
