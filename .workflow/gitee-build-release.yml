version: '1.0'
name: gitee-build-release
displayName: gitee-build-release
triggers:
  trigger: auto
  push:
    tags:
      prefix:
        - v
stages:
  - name: prepare
    displayName: Prepare deploy artifact
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: prepare_deploy_artifact
        displayName: Prepare deploy artifact
        nodeVersion: 22.22.0
        commands:
          - mkdir -p gitee-go-placeholder
          - echo ok > gitee-go-placeholder/README.txt
        artifacts:
          - name: DEPLOY_PLACEHOLDER
            path:
              - gitee-go-placeholder
        notify: []
        strategy:
          retry: '0'
  - name: build
    displayName: Build and publish on Windows host
    strategy: naturally
    trigger: auto
    steps:
      - step: deploy@agent
        name: build_and_publish
        displayName: 主机部署
        hostGroupID:
          ID: windows-builder
          hostID:
            - dec960e2-5240-45f9-b5d0-6ee2cd5007e3
        deployArtifact:
          - source: build
            name: output
            target: D:\gitee_go\deploy
            dependArtifact: DEPLOY_PLACEHOLDER
        script:
          - powershell -WindowStyle Hidden -NoProfile -ExecutionPolicy Bypass -Command "$ErrorActionPreference='Stop'; $candidates = @(); $git = Get-Command git.exe -ErrorAction SilentlyContinue | Select-Object -First 1; if ($git) { $root = Split-Path (Split-Path $git.Source -Parent) -Parent; $candidates += (Join-Path $root 'bin\bash.exe'); $candidates += (Join-Path $root 'usr\bin\bash.exe') }; $candidates += @('C:\Program Files\Git\bin\bash.exe', 'C:\Program Files\Git\usr\bin\bash.exe', 'C:\Program Files (x86)\Git\bin\bash.exe', 'C:\Program Files (x86)\Git\usr\bin\bash.exe'); $bash = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1; if (!$bash) { throw 'Git Bash not found. Install Git for Windows on this host.' }; & $bash -lc 'repo=/d/gitee_go/codex-forge; if [ ! -d \"$repo/.git\" ]; then rm -rf \"$repo\"; git clone https://gitee.com/llj20010218/codex-forge.git \"$repo\"; fi; cd \"$repo\"; git fetch origin main; git checkout main; git pull --ff-only origin main; bash scripts/gitee_go_windows_release.sh'"
        notify: []
        strategy:
          retry: '0'
